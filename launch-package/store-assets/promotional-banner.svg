<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <!-- Promotional Banner -->
  <defs>
    <linearGradient id="promoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B3A2D"/>
      <stop offset="50%" stop-color="#243F32"/>
      <stop offset="100%" stop-color="#1B3A2D"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="500" fill="url(#promoBg)"/>

  <!-- Decorative rings -->
  <circle cx="200" cy="250" r="350" fill="none" stroke="#2C4D3C" stroke-width="1" stroke-dasharray="6 10" opacity="0.2"/>
  <circle cx="824" cy="250" r="350" fill="none" stroke="#2C4D3C" stroke-width="1" stroke-dasharray="6 10" opacity="0.2"/>

  <!-- Central content -->
  <text x="512" y="170" text-anchor="middle" font-family="'Amiri', serif" font-size="72" font-weight="700" fill="#C9A84C">حَبّة</text>
  <text x="512" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#A0B4AA" letter-spacing="4">HABBAH</text>

  <!-- Decorative line -->
  <line x1="412" y1="260" x2="612" y2="260" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
  <circle cx="512" cy="260" r="3" fill="#C9A84C" opacity="0.6"/>

  <!-- Arabic tagline -->
  <text x="512" y="310" text-anchor="middle" font-family="'Amiri', serif" font-size="28" fill="#fff" opacity="0.9">اشعر بكل حبّة</text>
  <text x="512" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#6B8C7E" letter-spacing="2">Feel every bead</text>

  <!-- Feature highlights -->
  <text x="512" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#C9A84C" letter-spacing="3">
    DHIKR COUNTER  ·  STREAKS  ·  STATISTICS  ·  HAPTICS
  </text>

  <!-- Download CTA -->
  <rect x="392" y="440" width="240" height="42" rx="21" fill="rgba(201,168,76,0.15)" stroke="#C9A84C" stroke-width="1"/>
  <text x="512" y="467" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#C9A84C" letter-spacing="1">Download Free</text>
</svg>
