<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <!-- Android Phone Screenshot - Summary Screen -->
  <defs>
    <clipPath id="sumClip2">
      <rect x="0" y="0" width="1080" height="1920" rx="40"/>
    </clipPath>
    <radialGradient id="sumGlow2" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="rgba(201,168,76,0.15)"/>
      <stop offset="100%" stop-color="rgba(201,168,76,0)"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#sumClip2)">
    <rect width="1080" height="1920" fill="#1B3A2D"/>

    <!-- Status bar -->
    <rect x="0" y="0" width="1080" height="80" fill="rgba(0,0,0,0.15)"/>
    <text x="40" y="55" font-family="Roboto, system-ui" font-size="32" font-weight="500" fill="#fff">12:36</text>

    <!-- Glow -->
    <circle cx="540" cy="640" r="440" fill="url(#sumGlow2)"/>

    <!-- Checkmark -->
    <circle cx="540" cy="520" r="110" fill="none" stroke="#C9A84C" stroke-width="6"/>
    <polyline points="480,520 520,564 600,480" fill="none" stroke="#C9A84C" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Blessing -->
    <text x="540" y="730" text-anchor="middle" font-family="'Amiri', serif" font-size="54" font-weight="600" fill="#C9A84C">بارك الله في وقتك</text>

    <!-- Stats card -->
    <rect x="100" y="800" width="880" height="340" rx="48" fill="#243F32" stroke="#2C4D3C" stroke-width="2"/>

    <!-- Count -->
    <text x="340" y="930" text-anchor="middle" font-family="Roboto, system-ui" font-size="100" font-weight="800" fill="#C9A84C">٣٣</text>
    <text x="340" y="990" text-anchor="middle" font-family="Roboto, system-ui" font-size="34" fill="#6B8C7E">تسبيحة</text>

    <!-- Divider -->
    <line x1="540" y1="860" x2="540" y2="1080" stroke="#2C4D3C" stroke-width="2"/>

    <!-- Duration -->
    <text x="740" y="930" text-anchor="middle" font-family="Roboto, system-ui" font-size="100" font-weight="800" fill="#fff">٣</text>
    <text x="740" y="990" text-anchor="middle" font-family="Roboto, system-ui" font-size="34" fill="#6B8C7E">دقيقة و ١٢ ثانية</text>

    <!-- Dhikr name -->
    <text x="540" y="1100" text-anchor="middle" font-family="'Amiri', serif" font-size="38" fill="#A0B4AA">سُبْحَانَ اللَّهِ</text>

    <!-- Buttons -->
    <rect x="100" y="1230" width="880" height="120" rx="60" fill="#C9A84C"/>
    <text x="540" y="1305" text-anchor="middle" font-family="'Amiri', serif" font-size="42" font-weight="700" fill="#1B3A2D">تسبيح جديد</text>

    <rect x="100" y="1380" width="880" height="120" rx="60" fill="transparent" stroke="#C9A84C" stroke-width="3"/>
    <text x="540" y="1455" text-anchor="middle" font-family="'Amiri', serif" font-size="42" font-weight="600" fill="#C9A84C">نفس الذكر</text>
  </g>

  <rect x="0" y="0" width="1080" height="1920" rx="40" fill="none" stroke="#222" stroke-width="2"/>
</svg>
