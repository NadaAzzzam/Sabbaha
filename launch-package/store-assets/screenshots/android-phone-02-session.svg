<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <!-- Android Phone Screenshot - Session Screen -->
  <defs>
    <clipPath id="sessClip2">
      <rect x="0" y="0" width="1080" height="1920" rx="40"/>
    </clipPath>
    <linearGradient id="ringGold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E0C564"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#sessClip2)">
    <rect width="1080" height="1920" fill="#1B3A2D"/>

    <!-- Status bar -->
    <rect x="0" y="0" width="1080" height="80" fill="rgba(0,0,0,0.15)"/>
    <text x="40" y="55" font-family="Roboto, system-ui" font-size="32" font-weight="500" fill="#fff">12:33</text>

    <!-- Timer at top -->
    <text x="540" y="200" text-anchor="middle" font-family="'Roboto Mono', monospace" font-size="48" fill="#6B8C7E" letter-spacing="4">02:47</text>

    <!-- Progress Ring (75%) -->
    <circle cx="540" cy="820" r="320" fill="none" stroke="#243F32" stroke-width="16"/>
    <circle cx="540" cy="820" r="320" fill="none" stroke="url(#ringGold2)" stroke-width="16"
      stroke-dasharray="1508 2010" stroke-dashoffset="502"
      stroke-linecap="round" transform="rotate(-90 540 820)"/>

    <!-- Dhikr text -->
    <text x="540" y="760" text-anchor="middle" font-family="'Amiri', serif" font-size="56" font-weight="600" fill="#A0B4AA">سُبْحَانَ اللَّهِ</text>

    <!-- Count display -->
    <text x="540" y="900" text-anchor="middle" font-family="Roboto, system-ui" font-size="168" font-weight="800" fill="#C9A84C">٢٥</text>
    <text x="540" y="980" text-anchor="middle" font-family="Roboto, system-ui" font-size="48" fill="#6B8C7E">/ ٣٣</text>

    <!-- Tap hint -->
    <text x="540" y="1250" text-anchor="middle" font-family="Roboto, system-ui" font-size="30" fill="#6B8C7E" opacity="0.5">tap anywhere to count</text>

    <!-- Pause button -->
    <circle cx="200" cy="1660" r="64" fill="#243F32"/>
    <rect x="186" y="1636" width="10" height="48" rx="3" fill="#A0B4AA"/>
    <rect x="204" y="1636" width="10" height="48" rx="3" fill="#A0B4AA"/>
  </g>

  <rect x="0" y="0" width="1080" height="1920" rx="40" fill="none" stroke="#222" stroke-width="2"/>
</svg>
