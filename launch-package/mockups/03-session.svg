<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <!-- iPhone 14 frame - Session Screen (Core Feature) -->
  <defs>
    <clipPath id="sessClip">
      <rect x="0" y="0" width="390" height="844" rx="44"/>
    </clipPath>
    <linearGradient id="ringGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E0C564"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#sessClip)">
    <rect width="390" height="844" fill="#1B3A2D"/>

    <!-- Status bar -->
    <text x="35" y="36" font-family="SF Pro, system-ui" font-size="15" font-weight="600" fill="#fff">9:41</text>
    <rect x="122" y="0" width="146" height="34" rx="17" fill="#000"/>

    <!-- Timer at top -->
    <text x="195" y="90" text-anchor="middle" font-family="SF Pro Mono, monospace" font-size="20" fill="#6B8C7E" letter-spacing="2">
      02:47
    </text>

    <!-- Progress Ring (75% filled) -->
    <circle cx="195" cy="370" r="130" fill="none" stroke="#243F32" stroke-width="8"/>
    <!-- Filled arc (75% = 270 degrees) -->
    <circle cx="195" cy="370" r="130" fill="none" stroke="url(#ringGold)" stroke-width="8"
      stroke-dasharray="612.6 817.2" stroke-dashoffset="204.2"
      stroke-linecap="round" transform="rotate(-90 195 370)"/>

    <!-- Dhikr text -->
    <text x="195" y="345" text-anchor="middle" font-family="'Amiri', serif" font-size="26" font-weight="600" fill="#A0B4AA">
      سُبْحَانَ اللَّهِ
    </text>

    <!-- Count display -->
    <text x="195" y="405" text-anchor="middle" font-family="SF Pro, system-ui" font-size="72" font-weight="800" fill="#C9A84C">
      ٢٥
    </text>
    <text x="195" y="440" text-anchor="middle" font-family="SF Pro, system-ui" font-size="20" fill="#6B8C7E">
      / ٣٣
    </text>

    <!-- Tap hint (subtle) -->
    <text x="195" y="560" text-anchor="middle" font-family="SF Pro, system-ui" font-size="13" fill="#6B8C7E" opacity="0.5">
      tap anywhere to count
    </text>

    <!-- Bottom controls -->
    <!-- Pause button -->
    <circle cx="80" cy="740" r="26" fill="#243F32"/>
    <rect x="72" y="730" width="4" height="20" rx="1" fill="#A0B4AA"/>
    <rect x="82" y="730" width="4" height="20" rx="1" fill="#A0B4AA"/>

    <!-- Home indicator -->
    <rect x="142" y="830" width="106" height="5" rx="2.5" fill="#6B8C7E" opacity="0.3"/>
  </g>

  <rect x="0" y="0" width="390" height="844" rx="44" fill="none" stroke="#333" stroke-width="2"/>
</svg>
