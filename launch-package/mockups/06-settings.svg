<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <!-- iPhone 14 frame - Settings Screen -->
  <defs>
    <clipPath id="setClip">
      <rect x="0" y="0" width="390" height="844" rx="44"/>
    </clipPath>
  </defs>

  <g clip-path="url(#setClip)">
    <rect width="390" height="844" fill="#1B3A2D"/>

    <!-- Status bar -->
    <text x="35" y="36" font-family="SF Pro, system-ui" font-size="15" font-weight="600" fill="#fff">9:41</text>
    <rect x="122" y="0" width="146" height="34" rx="17" fill="#000"/>

    <!-- Title -->
    <text x="350" y="85" text-anchor="end" font-family="'Amiri', serif" font-size="30" font-weight="700" fill="#fff">الإعدادات</text>

    <!-- Settings card -->
    <rect x="20" y="110" width="350" height="508" rx="16" fill="#243F32" stroke="#2C4D3C" stroke-width="1"/>

    <!-- Row: Haptics -->
    <text x="340" y="148" text-anchor="end" font-family="SF Pro, system-ui" font-size="15" fill="#A0B4AA">الاهتزاز</text>
    <rect x="36" y="132" width="50" height="28" rx="14" fill="#C9A84C"/>
    <circle cx="66" cy="146" r="11" fill="#1B3A2D"/>
    <line x1="20" y1="170" x2="370" y2="170" stroke="#2C4D3C" stroke-width="1"/>

    <!-- Row: Haptic Intensity -->
    <text x="340" y="198" text-anchor="end" font-family="SF Pro, system-ui" font-size="15" fill="#A0B4AA">شدة الاهتزاز</text>
    <rect x="36" y="183" width="150" height="30" rx="15" fill="#1B3A2D"/>
    <text x="62" y="203" text-anchor="middle" font-family="SF Pro, system-ui" font-size="11" fill="#6B8C7E">خفيف</text>
    <rect x="86" y="183" width="50" height="30" rx="15" fill="#C9A84C"/>
    <text x="111" y="203" text-anchor="middle" font-family="SF Pro, system-ui" font-size="11" font-weight="600" fill="#1B3A2D">متوسط</text>
    <text x="161" y="203" text-anchor="middle" font-family="SF Pro, system-ui" font-size="11" fill="#6B8C7E">قوي</text>
    <line x1="20" y1="225" x2="370" y2="225" stroke="#2C4D3C" stroke-width="1"/>

    <!-- Row: Sound -->
    <text x="340" y="255" text-anchor="end" font-family="SF Pro, system-ui" font-size="15" fill="#A0B4AA">الأصوات</text>
    <rect x="36" y="238" width="50" height="28" rx="14" fill="#C9A84C"/>
    <circle cx="66" cy="252" r="11" fill="#1B3A2D"/>
    <line x1="20" y1="275" x2="370" y2="275" stroke="#2C4D3C" stroke-width="1"/>

    <!-- Row: Sound Volume -->
    <text x="340" y="305" text-anchor="end" font-family="SF Pro, system-ui" font-size="15" fill="#A0B4AA">مستوى الصوت</text>
    <rect x="36" y="290" width="150" height="30" rx="15" fill="#1B3A2D"/>
    <text x="62" y="310" text-anchor="middle" font-family="SF Pro, system-ui" font-size="11" fill="#6B8C7E">منخفض</text>
    <rect x="86" y="290" width="50" height="30" rx="15" fill="#C9A84C"/>
    <text x="111" y="310" text-anchor="middle" font-family="SF Pro, system-ui" font-size="11" font-weight="600" fill="#1B3A2D">متوسط</text>
    <text x="161" y="310" text-anchor="middle" font-family="SF Pro, system-ui" font-size="11" fill="#6B8C7E">مرتفع</text>
    <line x1="20" y1="332" x2="370" y2="332" stroke="#2C4D3C" stroke-width="1"/>

    <!-- Row: Reminder -->
    <text x="340" y="362" text-anchor="end" font-family="SF Pro, system-ui" font-size="15" fill="#A0B4AA">التذكير</text>
    <rect x="36" y="347" width="190" height="30" rx="15" fill="#1B3A2D"/>
    <text x="56" y="367" text-anchor="middle" font-family="SF Pro, system-ui" font-size="11" fill="#6B8C7E">إيقاف</text>
    <rect x="76" y="347" width="50" height="30" rx="15" fill="#C9A84C"/>
    <text x="101" y="367" text-anchor="middle" font-family="SF Pro, system-ui" font-size="11" font-weight="600" fill="#1B3A2D">٥ د</text>
    <text x="146" y="367" text-anchor="middle" font-family="SF Pro, system-ui" font-size="11" fill="#6B8C7E">١٠ د</text>
    <text x="196" y="367" text-anchor="middle" font-family="SF Pro, system-ui" font-size="11" fill="#6B8C7E">١٥ د</text>
    <line x1="20" y1="390" x2="370" y2="390" stroke="#2C4D3C" stroke-width="1"/>

    <!-- Row: Language -->
    <text x="340" y="420" text-anchor="end" font-family="SF Pro, system-ui" font-size="15" fill="#A0B4AA">اللغة</text>
    <rect x="36" y="404" width="120" height="30" rx="15" fill="#1B3A2D"/>
    <rect x="36" y="404" width="60" height="30" rx="15" fill="#C9A84C"/>
    <text x="66" y="424" text-anchor="middle" font-family="SF Pro, system-ui" font-size="11" font-weight="600" fill="#1B3A2D">العربية</text>
    <text x="126" y="424" text-anchor="middle" font-family="SF Pro, system-ui" font-size="11" fill="#6B8C7E">English</text>
    <line x1="20" y1="448" x2="370" y2="448" stroke="#2C4D3C" stroke-width="1"/>

    <!-- Row: Theme -->
    <text x="340" y="478" text-anchor="end" font-family="SF Pro, system-ui" font-size="15" fill="#A0B4AA">المظهر</text>
    <rect x="36" y="462" width="120" height="30" rx="15" fill="#1B3A2D"/>
    <rect x="36" y="462" width="60" height="30" rx="15" fill="#C9A84C"/>
    <text x="66" y="482" text-anchor="middle" font-family="SF Pro, system-ui" font-size="11" font-weight="600" fill="#1B3A2D">داكن</text>
    <text x="126" y="482" text-anchor="middle" font-family="SF Pro, system-ui" font-size="11" fill="#6B8C7E">فاتح</text>

    <!-- Version -->
    <text x="195" y="602" text-anchor="middle" font-family="SF Pro, system-ui" font-size="12" fill="#6B8C7E">الإصدار ١.٠.٠</text>

    <!-- Clear history button -->
    <rect x="20" y="640" width="350" height="50" rx="16" fill="transparent" stroke="#E57373" stroke-width="1"/>
    <text x="195" y="671" text-anchor="middle" font-family="'Amiri', serif" font-size="16" fill="#E57373">مسح السجل</text>

    <!-- Bottom Tab Bar -->
    <rect x="0" y="760" width="390" height="84" fill="#243F32"/>
    <line x1="0" y1="760" x2="390" y2="760" stroke="#2C4D3C" stroke-width="1"/>
    <circle cx="78" cy="790" r="4" fill="#6B8C7E"/>
    <text x="78" y="814" text-anchor="middle" font-family="SF Pro, system-ui" font-size="10" fill="#6B8C7E">الرئيسية</text>
    <rect x="183" y="782" width="24" height="18" rx="3" fill="none" stroke="#6B8C7E" stroke-width="1.5"/>
    <text x="195" y="814" text-anchor="middle" font-family="SF Pro, system-ui" font-size="10" fill="#6B8C7E">السجل</text>
    <circle cx="312" cy="790" r="9" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <circle cx="312" cy="790" r="3" fill="#C9A84C"/>
    <text x="312" y="814" text-anchor="middle" font-family="SF Pro, system-ui" font-size="10" font-weight="600" fill="#C9A84C">الإعدادات</text>

    <rect x="142" y="830" width="106" height="5" rx="2.5" fill="#6B8C7E" opacity="0.3"/>
  </g>

  <rect x="0" y="0" width="390" height="844" rx="44" fill="none" stroke="#333" stroke-width="2"/>
</svg>
