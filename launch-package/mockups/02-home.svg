<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <!-- iPhone 14 frame - Home Screen (Dark Mode) -->
  <defs>
    <clipPath id="homeClip">
      <rect x="0" y="0" width="390" height="844" rx="44"/>
    </clipPath>
  </defs>

  <g clip-path="url(#homeClip)">
    <!-- Background -->
    <rect width="390" height="844" fill="#1B3A2D"/>

    <!-- Status bar -->
    <text x="35" y="36" font-family="SF Pro, system-ui" font-size="15" font-weight="600" fill="#fff">9:41</text>
    <rect x="122" y="0" width="146" height="34" rx="17" fill="#000"/>

    <!-- Header Row -->
    <g transform="translate(20, 70)">
      <!-- Greeting -->
      <text x="0" y="0" font-family="SF Pro, system-ui" font-size="14" font-weight="500" fill="#A0B4AA">صباح الخير</text>
      <text x="0" y="42" font-family="'Amiri', serif" font-size="34" font-weight="700" fill="#C9A84C">حَبّة</text>

      <!-- Date pill -->
      <rect x="250" y="-8" width="110" height="56" rx="16" fill="#243F32" stroke="#2C4D3C" stroke-width="1"/>
      <text x="305" y="14" text-anchor="middle" font-family="SF Pro, system-ui" font-size="14" font-weight="700" fill="#C9A84C">الأحد</text>
      <text x="305" y="34" text-anchor="middle" font-family="SF Pro, system-ui" font-size="11" fill="#A0B4AA">١٣ أبريل</text>
    </g>

    <!-- Streak + Today Card -->
    <rect x="20" y="140" width="350" height="96" rx="20" fill="#243F32" stroke="#C9A84C" stroke-width="1.5"/>
    <!-- Streak side -->
    <text x="52" y="185" font-size="36">🔥</text>
    <text x="92" y="184" font-family="SF Pro, system-ui" font-size="28" font-weight="800" fill="#C9A84C">٧</text>
    <text x="92" y="206" font-family="SF Pro, system-ui" font-size="12" fill="#6B8C7E">يوم متواصل</text>
    <!-- Divider -->
    <line x1="195" y1="164" x2="195" y2="220" stroke="#2C4D3C" stroke-width="1"/>
    <!-- Today side -->
    <text x="348" y="190" text-anchor="end" font-family="SF Pro, system-ui" font-size="24" font-weight="700" fill="#fff">٢٣١</text>
    <text x="348" y="210" text-anchor="end" font-family="SF Pro, system-ui" font-size="11" fill="#6B8C7E">تسبيحات اليوم</text>
    <text x="348" y="226" text-anchor="end" font-family="SF Pro, system-ui" font-size="11" font-weight="600" fill="#C9A84C">١٢ دقيقة</text>

    <!-- Section header -->
    <circle cx="28" cy="266" r="3" fill="#C9A84C"/>
    <text x="40" y="270" font-family="'Amiri', serif" font-size="13" font-weight="600" fill="#A0B4AA" letter-spacing="0.5">اذكر الله</text>

    <!-- Dhikr Card 1 -->
    <rect x="20" y="290" width="350" height="80" rx="16" fill="#243F32" stroke="#2C4D3C" stroke-width="1"/>
    <text x="350" y="322" text-anchor="end" font-family="'Amiri', serif" font-size="22" font-weight="600" fill="#fff">سُبْحَانَ اللَّهِ</text>
    <text x="350" y="350" text-anchor="end" font-family="SF Pro, system-ui" font-size="12" fill="#6B8C7E">Subhan Allah</text>
    <rect x="36" y="314" width="48" height="28" rx="14" fill="rgba(201,168,76,0.15)"/>
    <text x="60" y="333" text-anchor="middle" font-family="SF Pro, system-ui" font-size="13" font-weight="600" fill="#C9A84C">×٣٣</text>

    <!-- Dhikr Card 2 -->
    <rect x="20" y="382" width="350" height="80" rx="16" fill="#243F32" stroke="#2C4D3C" stroke-width="1"/>
    <text x="350" y="414" text-anchor="end" font-family="'Amiri', serif" font-size="22" font-weight="600" fill="#fff">الْحَمْدُ لِلَّهِ</text>
    <text x="350" y="442" text-anchor="end" font-family="SF Pro, system-ui" font-size="12" fill="#6B8C7E">Alhamdulillah</text>
    <rect x="36" y="406" width="48" height="28" rx="14" fill="rgba(201,168,76,0.15)"/>
    <text x="60" y="425" text-anchor="middle" font-family="SF Pro, system-ui" font-size="13" font-weight="600" fill="#C9A84C">×٣٣</text>

    <!-- Dhikr Card 3 -->
    <rect x="20" y="474" width="350" height="80" rx="16" fill="#243F32" stroke="#2C4D3C" stroke-width="1"/>
    <text x="350" y="506" text-anchor="end" font-family="'Amiri', serif" font-size="22" font-weight="600" fill="#fff">اللَّهُ أَكْبَرُ</text>
    <text x="350" y="534" text-anchor="end" font-family="SF Pro, system-ui" font-size="12" fill="#6B8C7E">Allahu Akbar</text>
    <rect x="36" y="498" width="48" height="28" rx="14" fill="rgba(201,168,76,0.15)"/>
    <text x="60" y="517" text-anchor="middle" font-family="SF Pro, system-ui" font-size="13" font-weight="600" fill="#C9A84C">×٣٣</text>

    <!-- Dhikr Card 4 -->
    <rect x="20" y="566" width="350" height="80" rx="16" fill="#243F32" stroke="#2C4D3C" stroke-width="1"/>
    <text x="350" y="598" text-anchor="end" font-family="'Amiri', serif" font-size="22" font-weight="600" fill="#fff">لَا إِلَٰهَ إِلَّا اللَّهُ</text>
    <text x="350" y="626" text-anchor="end" font-family="SF Pro, system-ui" font-size="12" fill="#6B8C7E">La ilaha illallah</text>
    <rect x="36" y="590" width="42" height="28" rx="14" fill="rgba(201,168,76,0.15)"/>
    <text x="57" y="609" text-anchor="middle" font-family="SF Pro, system-ui" font-size="12" font-weight="600" fill="#C9A84C">حر</text>

    <!-- Add custom button -->
    <rect x="20" y="662" width="350" height="50" rx="16" fill="transparent" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="6 6"/>
    <text x="195" y="693" text-anchor="middle" font-family="SF Pro, system-ui" font-size="14" font-weight="600" fill="#C9A84C">+ أضف ذكرًا مخصصًا</text>

    <!-- Bottom Tab Bar -->
    <rect x="0" y="760" width="390" height="84" fill="#243F32"/>
    <line x1="0" y1="760" x2="390" y2="760" stroke="#2C4D3C" stroke-width="1"/>
    <!-- Home tab (active) -->
    <circle cx="78" cy="790" r="4" fill="#C9A84C"/>
    <text x="78" y="814" text-anchor="middle" font-family="SF Pro, system-ui" font-size="10" font-weight="600" fill="#C9A84C">الرئيسية</text>
    <!-- History tab -->
    <rect x="183" y="782" width="24" height="18" rx="3" fill="none" stroke="#6B8C7E" stroke-width="1.5"/>
    <line x1="186" y1="788" x2="204" y2="788" stroke="#6B8C7E" stroke-width="1"/>
    <line x1="186" y1="793" x2="200" y2="793" stroke="#6B8C7E" stroke-width="1"/>
    <text x="195" y="814" text-anchor="middle" font-family="SF Pro, system-ui" font-size="10" fill="#6B8C7E">السجل</text>
    <!-- Settings tab -->
    <circle cx="312" cy="790" r="9" fill="none" stroke="#6B8C7E" stroke-width="1.5"/>
    <circle cx="312" cy="790" r="3" fill="#6B8C7E"/>
    <text x="312" y="814" text-anchor="middle" font-family="SF Pro, system-ui" font-size="10" fill="#6B8C7E">الإعدادات</text>

    <!-- Home indicator -->
    <rect x="142" y="830" width="106" height="5" rx="2.5" fill="#6B8C7E" opacity="0.3"/>
  </g>

  <rect x="0" y="0" width="390" height="844" rx="44" fill="none" stroke="#333" stroke-width="2"/>
</svg>
