# Project-wide Gradle settings.
# JDK 22+ blocks some native/System APIs Gradle/AGP use during CMake — these flags reduce failures on newer JDKs.
# Prefer JDK 17–21 for Android (e.g. Android Studio jbr); see scripts/run-android.js.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 --enable-native-access=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.caching=true

android.useAndroidX=true
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64
# newArchEnabled is removed as it's enabled by default in RN 0.85
hermesEnabled=true
edgeToEdgeEnabled=false
